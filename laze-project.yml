imports:
  - git:
      url: https://github.com/ariel-os/ariel-os
      tag: v0.4.0
    dldir: ariel-os

apps:
  - name: ariel-os-tiny-ml
    selects:
      - alloc
    # Mirror `ariel-os-hello` defaults to make the runner happy.
    env:
      global:
        executor_stacksize_required:
          - "65536"
